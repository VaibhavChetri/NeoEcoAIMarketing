services:
  - type: web
    name: neo-eco-ai-marketing
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn dashboard.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SENDER_EMAIL
        sync: false
      - key: SENDER_NAME
        value: Neo Eco Cleaning
      - key: IMAP_HOST
        sync: false
      - key: IMAP_PORT
        sync: false
      - key: IMAP_USERNAME
        sync: false
      - key: IMAP_PASSWORD
        sync: false
      - key: APOLLO_API_KEY
        sync: false
      - key: MAX_EMAILS_PER_DAY
        value: "30"
      - key: EMAIL_DELAY_SECONDS
        value: "60"
      - key: DRY_RUN
        value: "true"
      - key: TRACKING_BASE_URL
        sync: false
