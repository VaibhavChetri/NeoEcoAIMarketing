email_templates:
  cold_outreach:
    subject_lines:
      - "{{company_name}} — Eco-Friendly Block Cleaning for Your Properties"
      - "Trusted by Rendall & Rittner — Could We Help {{company_name}}?"
      - "{{area}} Block Cleaning — Free Site Survey for {{company_name}}"
      - "Quick Q: Happy with Your Current Cleaning Contractor?"
      - "Ex-Hilton Standards, Eco-Friendly Products — Block Cleaning for {{company_name}}"

    body_structure:
      - "Brief personalised intro (reference their properties/portfolio)"
      - "Specific pain point (unreliable contractors, poor standards, harsh chemicals)"
      - "Our solution (eco-friendly, quality guarantee, experienced team)"
      - "Social proof (Rendall & Rittner, MVN Block Management)"
      - "Low-friction CTA (free site survey, no-obligation quote)"

  follow_up:
    cadence:
      - day: 1
        type: "Initial outreach"
      - day: 4
        type: "Case study / client reference share"
      - day: 8
        type: "Free site survey offer"
      - day: 14
        type: "Breakup email (permission to close file)"

content_guidelines:
  tone: "Professional, warm, and environmentally conscious — not pushy"
  max_word_count: 350
  avoid:
    - "Generic mass email language"
    - "Hard selling or pressure tactics"
    - "Environmental greenwashing — be specific about eco practices"
    - "Mentioning competitors by name"
    - "Overpromising or unrealistic guarantees"

  include:
    - "Specific named clients (Rendall & Rittner, MVN Block Management)"
    - "Eco-friendly product details"
    - "Quality Guarantee reference"
    - "North London expertise"
    - "Clear, low-pressure next step (free survey, no-obligation quote)"
    - "Personal touch (reference their properties/area)"

seasonal_outreach:
  spring:
    outreach_months: ["February", "March", "April"]
    focus: "Spring deep clean campaigns, post-winter maintenance, new contract season"
  summer:
    outreach_months: ["May", "June", "July"]
    focus: "Outdoor cleaning, pressure washing, window cleaning campaigns"
  autumn:
    outreach_months: ["September", "October"]
    focus: "Back-to-routine cleaning schedules, pre-winter preparation"
  winter:
    outreach_months: ["November", "December", "January"]
    focus: "Year-end contract renewals, new year cleaning contracts"
  note: "Property managers typically review contracts quarterly. Target January and April for new contract pitches."

gdpr_compliance:
  basis: "Legitimate interest (B2B prospecting to property management companies)"
  requirements:
    - "Only email business contacts at property management companies"
    - "Include unsubscribe link in every email"
    - "Honour opt-outs within 24 hours"
    - "Don't buy email lists"
    - "Store opt-outs permanently"
    - "Include company contact details in footer"
    - "Comply with UK GDPR and PECR regulations"
